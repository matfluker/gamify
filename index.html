<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <!-- Apple Touch Icon: iMessage and iOS use this as the brand mark for
         home-screen pins and as a small fallback in link unfurls when no
         og:image is rendered. -->
    <link rel="apple-touch-icon" href="/og.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>Gamify</title>
    <meta name="description" content="A friendly score battle with the people you love." />

    <!-- Open Graph (iMessage, WhatsApp, Slack, Facebook). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Gamify" />
    <meta property="og:title" content="Gamify" />
    <meta property="og:description" content="A friendly score battle with the people you love." />
    <meta property="og:image" content="/og.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Gamify" />

    <!-- Twitter Card. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gamify" />
    <meta name="twitter:description" content="A friendly score battle with the people you love." />
    <meta name="twitter:image" content="/og.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
