name: Leaderboard change notifications

# Every 10 minutes (UTC). See cron-hourly.yml for the why-GitHub-Actions
# context and the one-time CRON_SECRET setup steps.
#
# The /leaderboard-changes endpoint short-circuits if there's been no
# points_ledger activity in the last 30 minutes, so most runs are cheap.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  leaderboard-changes:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/notifications/leaderboard-changes
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sS --fail-with-body \
            -X POST https://gamify-matflukers-projects.vercel.app/api/cron/notifications/leaderboard-changes \
            -H "Authorization: Bearer $CRON_SECRET"
