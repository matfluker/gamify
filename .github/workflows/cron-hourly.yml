name: Hourly notification crons

# Vercel Hobby caps cron jobs at daily frequency, so we drive the hourly
# push-notification endpoints from GitHub Actions instead. The endpoints
# themselves live in api/_app.js and accept either Vercel's x-vercel-cron
# header or `Authorization: Bearer $CRON_SECRET` — we use the latter.
#
# Schedule is UTC. `0 * * * *` = top of every hour. Each handler is internally
# tz-aware: daily-quiz only sends to users whose LOCAL hour=8, streak-danger
# only to users where it's LOCALLY Saturday 18:00, so firing globally hourly
# is correct and idempotent.
#
# Setup steps (one time):
#   1. In GitHub: repo → Settings → Secrets and variables → Actions → New
#      repository secret → name `CRON_SECRET`, value = same as Vercel env
#      var (`vercel env pull` then `grep CRON_SECRET .env.local`).
#   2. Push this file. Workflows fire on their schedule automatically.
#   3. Manually verify with `workflow_dispatch` (the "Run workflow" button in
#      the Actions tab) before relying on the schedule.
#
# Known limitations:
#   - GitHub Actions schedule has variable delay under load (typically 0-15
#     min late). For these endpoints that's fine.
#   - If the repo has no commits for 60 days, scheduled workflows auto-
#     disable. Push something occasionally or re-enable from the Actions tab.

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  daily-quiz:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/notifications/daily-quiz
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sS --fail-with-body \
            -X POST https://gamify-matflukers-projects.vercel.app/api/cron/notifications/daily-quiz \
            -H "Authorization: Bearer $CRON_SECRET"

  streak-danger:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/notifications/streak-danger
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sS --fail-with-body \
            -X POST https://gamify-matflukers-projects.vercel.app/api/cron/notifications/streak-danger \
            -H "Authorization: Bearer $CRON_SECRET"
